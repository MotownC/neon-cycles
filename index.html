<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NEON CYCLES</title>
  <link rel="stylesheet" href="styles.css?v=0.17.11" />
</head>
<body>
  <div id="stage">
    <canvas id="game"></canvas>

    <!-- Menu overlay -->
    <section id="menu" class="overlay">
      <h1 class="neon-title">NEON&nbsp;CYCLES</h1>
      <div class="menu-buttons">
        <button data-mode="1p" class="neon-btn cyan">1 PLAYER — SURVIVAL</button>
        <button data-mode="cpu" class="neon-btn cyan">1 PLAYER — VS CPU</button>
        <button data-mode="gauntlet" class="neon-btn cyan">GAUNTLET — FACE THE FIVE</button>
        <button data-mode="2p" class="neon-btn magenta">2 PLAYER — LOCAL</button>
        <button id="online-toggle" class="neon-btn magenta">2 PLAYER — ONLINE</button>
      </div>
      <div id="online-panel" class="hidden">
        <div style="display:flex;flex-direction:column;gap:8px;align-items:center;margin:8px 0">
          <button id="online-host" class="neon-btn cyan">HOST — GET A ROOM CODE</button>
          <div style="display:flex;gap:8px;align-items:center">
            <input id="online-code-input" maxlength="4" placeholder="CODE" autocapitalize="characters"
              autocomplete="off" spellcheck="false"
              style="width:7ch;background:#0a0a14;border:1px solid #2de2e6;color:#2de2e6;font:inherit;text-align:center;text-transform:uppercase;padding:6px" />
            <button id="online-join" class="neon-btn magenta">JOIN</button>
          </div>
          <p class="hint" id="online-status"></p>
        </div>
      </div>
      <p class="hint" id="gauntlet-best"></p>
      <div style="display:flex;gap:16px;justify-content:center">
        <button id="settings-toggle" class="neon-btn cyan">SETTINGS</button>
        <button id="leaderboard-toggle" class="neon-btn magenta">LEADERBOARD</button>
        <button id="controls-toggle" class="neon-btn cyan">CONTROLS</button>
      </div>
      <div id="controls-panel" class="hidden">
        <div class="controls-grid">
          <div class="controls-col">
            <h4>PLAYER 1</h4>
            <span class="hint">Up: Arrow Up</span>
            <span class="hint">Down: Arrow Down</span>
            <span class="hint">Left: Arrow Left</span>
            <span class="hint">Right: Arrow Right</span>
            <span class="hint">Turbo: Right Shift</span>
            <span class="hint">Fire: /</span>
          </div>
          <div class="controls-col">
            <h4>PLAYER 2</h4>
            <span class="hint">Up: W</span>
            <span class="hint">Down: S</span>
            <span class="hint">Left: A</span>
            <span class="hint">Right: D</span>
            <span class="hint">Turbo: Left Shift</span>
            <span class="hint">Fire: Q</span>
          </div>
        </div>
      </div>
      <div class="wall-toggle settings-group hidden" role="group" aria-label="Wall density">
        <span class="hint">WALLS</span>
        <button data-wall="none" class="wall-btn active">NONE</button>
        <button data-wall="low" class="wall-btn">LOW</button>
        <button data-wall="med" class="wall-btn">MED</button>
        <button data-wall="high" class="wall-btn">HIGH</button>
      </div>
      <div class="target-toggle settings-group hidden" role="group" aria-label="Match target">
        <span class="hint">FIRST TO</span>
        <button data-target="3" class="wall-btn">3</button>
        <button data-target="5" class="wall-btn">5</button>
        <button data-target="10" class="wall-btn active">10</button>
        <button data-target="15" class="wall-btn">15</button>
      </div>
      <div class="rival-toggle settings-group hidden" role="group" aria-label="CPU rival">
        <span class="hint">RIVAL</span>
        <button data-rival="drifter" class="wall-btn">DRIFTER</button>
        <button data-rival="survivor" class="wall-btn">SURVIVOR</button>
        <button data-rival="aggressor" class="wall-btn active">AGGRESSOR</button>
        <button data-rival="ambusher" class="wall-btn">AMBUSHER</button>
        <button data-rival="grandmaster" class="wall-btn">GRANDMASTER</button>
        <button data-rival="random" class="wall-btn">RANDOM</button>
      </div>
      <div class="turbo-toggle settings-group hidden" role="group" aria-label="Turbo mode">
        <span class="hint">TURBO</span>
        <button data-turbo="off" class="wall-btn active">OFF</button>
        <button data-turbo="on" class="wall-btn">ON</button>
      </div>
      <div class="trail-toggle settings-group hidden" role="group" aria-label="Trail mode">
        <span class="hint">TRAIL</span>
        <button data-trail="tron" class="wall-btn active">TRON</button>
        <button data-trail="fade" class="wall-btn">FADE</button>
        <button data-trail="classic" class="wall-btn">CLASSIC</button>
      </div>
      <div class="music-toggle settings-group hidden" role="group" aria-label="Music track">
        <span class="hint">MUSIC</span>
        <button data-music="original" class="wall-btn active">ORIGINAL</button>
        <button data-music="darkwave" class="wall-btn">DARKWAVE</button>
        <button data-music="custom" id="music-custom-btn" class="wall-btn">CUSTOM…</button>
        <input type="file" id="music-file-input" accept="audio/*" class="hidden" />
      </div>
      <div class="color-toggle settings-group hidden" id="color-toggle" role="group" aria-label="Cycle color">
        <span class="hint">COLOR</span>
      </div>
      <div id="leaderboard" class="leaderboard hidden"></div>
      <p class="hint" id="version">v0.17.11</p>
    </section>

    <!-- Countdown overlay -->
    <section id="countdown" class="overlay hidden"><span id="count">3</span></section>

    <!-- HUD (during play) -->
    <div id="hud" class="hud hidden"></div>

    <!-- Round/Game over overlay -->
    <section id="gameover" class="overlay hidden">
      <h2 id="go-title" class="neon-title"></h2>
      <div id="go-body"></div>
      <button id="go-continue" class="neon-btn">PRESS ENTER</button>
    </section>
  </div>

  <!-- ?v= must match the version shown in the menu; bump both together so
       browsers refetch scripts instead of reusing stale cached copies -->
  <script src="src/geometry.js?v=0.17.11"></script>
  <script src="src/attract.js?v=0.17.11"></script>
  <script src="src/snake.js?v=0.17.11"></script>
  <script src="src/board.js?v=0.17.11"></script>
  <script src="src/hazard.js?v=0.17.11"></script>
  <script src="src/trail.js?v=0.17.11"></script>
  <script src="src/projectile.js?v=0.17.11"></script>
  <script src="src/powerups.js?v=0.17.11"></script>
  <script src="src/walls.js?v=0.17.11"></script>
  <script src="src/round.js?v=0.17.11"></script>
  <script src="src/match.js?v=0.17.11"></script>
  <script src="src/gauntlet.js?v=0.17.11"></script>
  <script src="src/cpu.js?v=0.17.11"></script>
  <script src="src/speed.js?v=0.17.11"></script>
  <script src="src/leaderboard.js?v=0.17.11"></script>
  <script src="src/audio.js?v=0.17.11"></script>
  <script src="src/sprites.js?v=0.17.11"></script>
  <script src="src/renderer.js?v=0.17.11"></script>
  <script src="src/input.js?v=0.17.11"></script>
  <script src="src/net.js?v=0.17.11"></script>
  <script src="src/online.js?v=0.17.11"></script>
  <script src="src/main.js?v=0.17.11"></script>
</body>
</html>
